<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>VulnProbe — Register</title>
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #0d1117;
      font-family: 'Courier New', 'Fira Mono', monospace;
      color: #c9d1d9;
      overflow: hidden;
      padding: 24px 0;
    }

    /* Animated grid background */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(rgba(0, 255, 136, 0.03) 1px, transparent 1px),
        linear-gradient(90deg, rgba(0, 255, 136, 0.03) 1px, transparent 1px);
      background-size: 40px 40px;
      animation: gridShift 20s linear infinite;
      z-index: 0;
    }

    @keyframes gridShift {
      0%   { transform: translate(0, 0); }
      100% { transform: translate(40px, 40px); }
    }

    .login-container {
      position: relative;
      z-index: 1;
      width: 380px;
      padding: 40px 36px 32px;
      background: rgba(22, 27, 34, 0.85);
      border: 1px solid rgba(0, 255, 136, 0.15);
      border-radius: 12px;
      backdrop-filter: blur(12px);
      box-shadow:
        0 0 40px rgba(0, 255, 136, 0.05),
        0 20px 60px rgba(0, 0, 0, 0.5);
    }

    .login-container::before {
      content: '';
      position: absolute;
      inset: -1px;
      border-radius: 12px;
      background: linear-gradient(135deg, rgba(0,255,136,0.25), transparent 40%, transparent 60%, rgba(0,255,136,0.15));
      z-index: -1;
      opacity: 0.6;
    }

    .logo {
      text-align: center;
      margin-bottom: 32px;
    }

    .logo-icon {
      font-size: 36px;
      margin-bottom: 8px;
    }

    .logo h1 {
      font-size: 22px;
      font-weight: 700;
      letter-spacing: 2px;
      color: #00ff88;
      text-shadow: 0 0 20px rgba(0, 255, 136, 0.3);
    }

    .logo p {
      font-size: 11px;
      color: #6e7681;
      margin-top: 4px;
      letter-spacing: 1px;
      text-transform: uppercase;
    }

    .form-group {
      margin-bottom: 18px;
    }

    label {
      display: block;
      font-size: 11px;
      color: #8b949e;
      text-transform: uppercase;
      letter-spacing: 1.5px;
      margin-bottom: 6px;
    }

    input[type="text"],
    input[type="email"],
    input[type="password"] {
      width: 100%;
      padding: 12px 14px;
      background: rgba(13, 17, 23, 0.8);
      border: 1px solid rgba(0, 255, 136, 0.12);
      border-radius: 6px;
      color: #c9d1d9;
      font-family: inherit;
      font-size: 14px;
      outline: none;
      transition: border-color 0.25s, box-shadow 0.25s;
    }

    input:focus {
      border-color: #00ff88;
      box-shadow: 0 0 0 3px rgba(0, 255, 136, 0.1);
    }

    .btn-login {
      width: 100%;
      padding: 12px;
      margin-top: 6px;
      background: linear-gradient(135deg, #00ff88, #00cc6a);
      color: #0d1117;
      font-family: inherit;
      font-size: 13px;
      font-weight: 700;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      transition: transform 0.15s, box-shadow 0.25s;
    }

    .btn-login:hover {
      transform: translateY(-1px);
      box-shadow: 0 4px 20px rgba(0, 255, 136, 0.35);
    }

    .btn-login:active {
      transform: translateY(0);
    }

    .error-msg {
      background: rgba(248, 81, 73, 0.1);
      border: 1px solid rgba(248, 81, 73, 0.3);
      color: #f85149;
      padding: 10px 14px;
      border-radius: 6px;
      font-size: 12px;
      margin-bottom: 18px;
      text-align: center;
    }

    .alt-link {
      text-align: center;
      margin-top: 20px;
      font-size: 12px;
      color: #8b949e;
    }
    .alt-link a {
      color: #00ff88;
      text-decoration: none;
    }
    .alt-link a:hover { text-decoration: underline; }

    .disclaimer {
      text-align: center;
      margin-top: 16px;
      font-size: 10px;
      color: #484f58;
      letter-spacing: 0.5px;
    }
  </style>
</head>
<body>

  <div class="login-container">
    <div class="logo">
      <div class="logo-icon">🛡️</div>
      <h1>VULNPROBE</h1>
      <p>Create Account</p>
    </div>

    {% if error %}
    <div class="error-msg">{{ error }}</div>
    {% endif %}

    <form method="POST" action="{{ url_for('register') }}">
      <div class="form-group">
        <label for="username">Username</label>
        <input type="text" id="username" name="username" autocomplete="username" required autofocus />
      </div>
      <div class="form-group">
        <label for="email">Email</label>
        <input type="email" id="email" name="email" autocomplete="email" required />
      </div>
      <div class="form-group">
        <label for="password">Password</label>
        <input type="password" id="password" name="password" autocomplete="new-password" minlength="8" required />
      </div>
      <div class="form-group">
        <label for="confirm_password">Confirm Password</label>
        <input type="password" id="confirm_password" name="confirm_password" autocomplete="new-password" minlength="8" required />
      </div>
      <button type="submit" class="btn-login">Register</button>
    </form>

    <div class="alt-link">
      Already have an account? <a href="{{ url_for('login') }}">Sign in</a>
    </div>

    <div class="disclaimer">⚠ Authorized use only</div>
  </div>

</body>
</html>
