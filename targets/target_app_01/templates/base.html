<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nonprofit Donor Portal</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #121212;
            color: #ffffff;
            margin: 0;
            padding: 0;
        }
        nav {
            background-color: #1e1e1e;
            padding: 15px;
            text-align: center;
        }
        nav a {
            color: #bb86fc;
            text-decoration: none;
            margin: 0 15px;
            font-weight: bold;
        }
        nav a:hover {
            color: #ffffff;
        }
        .container {
            max-width: 800px;
            margin: 40px auto;
            padding: 20px;
            background-color: #1e1e1e;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.3);
        }
        input, textarea, button {
            width: 100%;
            padding: 10px;
            margin-bottom: 15px;
            border: 1px solid #333;
            border-radius: 4px;
            background-color: #2c2c2c;
            color: #fff;
            box-sizing: border-box;
        }
        button {
            background-color: #bb86fc;
            color: #000;
            border: none;
            font-weight: bold;
            cursor: pointer;
        }
        button:hover {
            background-color: #9965f4;
        }
        .error {
            color: #cf6679;
            margin-bottom: 15px;
        }
        table {
            width: 100%;
            border-collapse: collapse;
        }
        th, td {
            text-align: left;
            padding: 12px;
            border-bottom: 1px solid #333;
        }
        th {
            background-color: #2c2c2c;
        }
    </style>
</head>
<body>

<nav>
    <a href="/login">Login</a>
    <a href="/dashboard">Dashboard</a>
    <a href="/donate">Donate</a>
    <a href="/search">Search Donors</a>
    <a href="/logout">Logout</a>
</nav>

<div class="container">
    {% block content %}{% endblock %}
</div>

</body>
</html>
