{% extends "base.html" %}

{% block content %}
    <h2>Make a Donation</h2>
    
    {% if success %}
        <div style="background-color: #2c2c2c; padding: 15px; border-left: 4px solid #bb86fc; margin-bottom: 20px;">
            <h3>Thank you, {{ name }}!</h3>
            <p>Your donation has been recorded.</p>
            <p>Your message:</p>
            <!-- VULNERABILITY: XSS — message rendered without escaping -->
            <blockquote>{{ message | safe }}</blockquote>
        </div>
        <p><a href="/donate">Make another donation</a></p>
    {% else %}
        <form method="POST" action="/donate">
            <label for="name">Full Name</label>
            <input type="text" id="name" name="name" required>

            <label for="email">Email</label>
            <input type="email" id="email" name="email" required>

            <label for="amount">Donation Amount ($)</label>
            <input type="number" id="amount" name="amount" step="0.01" min="1" required>

            <label for="message">Public Message</label>
            <textarea id="message" name="message" rows="4"></textarea>

            <button type="submit">Submit Donation</button>
        </form>
    {% endif %}
{% endblock %}
